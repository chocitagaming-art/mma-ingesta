name: Refresh upcoming events

# Keeps "Próximos" in sync with ufc.com (events + cards) and enriches the new
# fighters (photo / record / nationality). Idempotent — see
# src/scrapers/refresh_upcoming.py. Writes to the production Neon DB.
on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {} # manual "Run workflow" button

concurrency:
  group: refresh-upcoming
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-scrapers.txt
      - run: pip install -r requirements-scrapers.txt
      - name: Run refresh pipeline
        run: python -m src.scrapers.refresh_upcoming
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
